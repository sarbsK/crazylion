<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 10px;
        }
        .gallery img {
            margin: 10px;
            max-width: 300px;
            height: auto;
            border: 5px solid #ddd;
            border-radius: 10px;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .gallery img:hover {
            transform: scale(1.05);
        }
        .container {
            max-width: 1800px;
            margin: 0 auto;
        }
        .header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .header a {
            color: #ff6f61;
            text-decoration: none;
        }
        .header a:hover {
            text-decoration: underline;
        }
        /* Modal styles */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
        }
        .modal-content {
            position: relative;
            width: 90%;
            max-width: 90%; /* Maximum width for the modal */
            max-height: 90%; /* Maximum height for the modal */
            margin: auto;
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .modal-content iframe {
            width: 100%;
            height: 56.25vw; /* Maintain 16:9 aspect ratio */
            max-height: 100%;
            border: none;
        }
        .modal-content img, .modal-content video {
            max-width: 100%;
            max-height: 100%;
            margin: 10px 0;
        }
        .close {
            position: absolute;
            top: 10px;
            right: 25px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover,
        .close:focus {
            color: #bbb;
            text-decoration: none;
        }
        .nav-controls {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
        }
        .nav-controls button {
            background-color: rgba(0,0,0,0.7);
            color: white;
            border: none;
            padding: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        .nav-controls button:hover {
            background-color: rgba(0,0,0,0.9);
        }
        /* Description styles */
        .description {
            color: white;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Gallery</h1>
        <p><a href="../index.html">Home</a></p>
    </div>
    <div class="container">
        <div class="gallery">
            <!-- Thumbnails -->
            <img src="images/thumbs/pray.jpg" alt="Seated Praying Figure" onclick="openModal(0)">
            <img src="images/thumbs/icegoddess.jpg?v=2" alt="Ice Goddess character study" onclick="openModal(1)">
            <img src="images/thumbs/drawing.jpg" alt="Traditional Pencil Study" onclick="openModal(2)">
            <img src="images/thumbs/male.jpg" alt="Ecorche Male Study" onclick="openModal(3)">
            <img src="images/thumbs/female.png?v=2" alt="Ecorche Female Study" onclick="openModal(4)">
            <img src="images/thumbs/saturne-enlevant-cybele.jpg?v=2" alt="Saturn abducting Cybele sculpture study" onclick="openModal(5)">
            <img src="images/thumbs/portrait-dali.jpg" alt="Salvador Dalí charcoal study" onclick="openModal(6)">
            <img src="images/thumbs/creature.jpg?v=2" alt="Demonic Creature ZBrush sculpt" onclick="openModal(7)">
            <img src="images/thumbs/sword-01.jpg" alt="Fantasy Sword Artifact weapon modeling" onclick="openModal(8)">
            <img src="images/thumbs/Spirit%20of%20Ecstasy.jpg?v=2" alt="Spirit of Ecstasy sculpture study" onclick="openModal(9)">
        </div>
    </div>

    <!-- Modal -->
    <div id="imageModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <div class="modal-content" id="modalContent">
            <!-- Content for modal will be populated by JavaScript -->
        </div>
        <div class="nav-controls">
            <button onclick="prevImage()">&#10094;</button>
            <button onclick="nextImage()">&#10095;</button>
        </div>
    </div>

    <script>
        const imageSets = [
            [
                { type: 'image', src: 'images/fulls/pray-03.jpg', description: 'Seated Praying Figure Sculpture - Front 3/4 Studio View' },
                { type: 'image', src: 'images/fulls/pray-02.jpg', description: 'Seated Praying Figure Sculpture - Side Studio View' },
                { type: 'image', src: 'images/fulls/pray-01.jpg', description: 'Seated Praying Figure Sculpture - Rear Studio View' },
                { type: 'image', src: 'images/fulls/front-01.jpg', description: 'Praying Figure - Anatomical frontal silhouette study' },
                { type: 'image', src: 'images/fulls/front-02.jpg', description: 'Praying Figure - Alternative frontal silhouette study' },
                { type: 'image', src: 'images/fulls/closeup-01.jpg', description: 'Praying Figure - Detailed upper torso and head close-up' },
                { type: 'image', src: 'images/fulls/closeup-02.jpg', description: 'Praying Figure - Alternative face plane close-up study' },
                { type: 'video', src: 'images/fulls/pray-turntable.mp4', description: 'Seated Praying Figure - Full 360-degree studio turntable showcase' },
                { type: 'image', src: 'images/fulls/pray_sculpt-01.jpg', description: 'Anatomical sculpt study - frontal planes' },
                { type: 'image', src: 'images/fulls/pray_sculpt-02.jpg', description: 'Anatomical sculpt study - back planes' },
                { type: 'image', src: 'images/fulls/pray_sculpt-03.jpg', description: 'Anatomical sculpt study - side planes' },
                { type: 'image', src: 'images/fulls/pray_sculpt-04.jpg', description: 'Anatomical sculpt study - three-quarter planes' }
            ],
            [
                { type: 'image', src: 'images/fulls/icegoddess-01.jpg', description: 'Ice Goddess digital model - Front character rendering' },
                { type: 'image', src: 'images/fulls/icegoddess-02.jpg', description: 'Ice Goddess digital model - Back character rendering' },
                { type: 'image', src: 'images/fulls/icegoddess-03.jpg', description: 'Ice Goddess digital model - Three-quarter character rendering' },
                { type: 'image', src: 'images/fulls/icegoddess.gif', description: 'Ice Goddess digital model - Dynamic turntable rotation loop' },
                { type: 'image', src: 'images/fulls/maya-viewport.jpg', description: 'Ice Goddess digital model - Maya wireframe viewport topology study' }
            ],
            [
                { type: 'image', src: 'images/fulls/drawing.jpg', description: 'Traditional Pencil Study - Skeletal structure and muscle volume gesture drawing' },
                { type: 'image', src: 'images/fulls/drawing-02.jpg', description: 'Traditional Pencil Study - Planar head study and structural drawing' },
                { type: 'image', src: 'images/fulls/painting.jpg', description: 'Traditional Portrait Painting - High-fidelity realistic oil painting' }
            ],
            [
                { type: 'image', src: 'images/fulls/male_render_main_03.png', description: 'Ecorche Male Study - Digital clay render dynamic view' },
                { type: 'image', src: 'images/fulls/male_render_front_main.jpg', description: 'Ecorche Male Study - Digital clay render front view' },
                { type: 'image', src: 'images/fulls/male_render_back_main_02.jpg', description: 'Ecorche Male Study - Digital clay render back view' },
                { type: 'image', src: 'images/fulls/male_render_sculpt.jpg', description: 'Ecorche Male Study - High-poly anatomical muscle structure sculpt' },
                { type: 'youtube', src: 'https://www.youtube-nocookie.com/embed/ONt6ppBlq7I', description: 'Zbrush Ecorche Male Study - Full digital clay modeling process' },
                { type: 'youtube', src: 'https://www.youtube-nocookie.com/embed/oV_MWZk0_k8', description: 'Zbrush Ecorche Male Study - Alternative render and turntable rotation review' }
            ],
            [
                { type: 'image', src: 'images/fulls/female_render_main_03.png', description: 'Ecorche Female Study - Digital clay render dynamic view' },
                { type: 'image', src: 'images/fulls/female_render_main.png', description: 'Ecorche Female Study - Digital clay render front view' },
                { type: 'image', src: 'images/fulls/female_render_main_02.png', description: 'Ecorche Female Study - Digital clay render back view' },
                { type: 'image', src: 'images/fulls/female_sculpt_01.jpg', description: 'Ecorche Female Study - High-poly anatomical muscle structure sculpt' },
                { type: 'image', src: 'images/fulls/female_render.jpg', description: 'Ecorche Female Study - Alternative digital clay render' },
                { type: 'youtube', src: 'https://www.youtube-nocookie.com/embed/29TKtGscX38', description: 'Zbrush Ecorche Female Study - Full digital clay modeling process' },
                { type: 'youtube', src: 'https://www.youtube-nocookie.com/embed/wOIKUQ15ZiU', description: 'Zbrush Ecorche Female Study - Alternative render and turntable rotation review' }
            ],
            [
                { type: 'image', src: 'images/fulls/saturne-enlevant-cybele_main.jpg', description: 'Saturn abducting Cybele - Classical sculpture study front render' },
                { type: 'image', src: 'images/fulls/saturne-enlevant-cybele-02.jpg', description: 'Saturn abducting Cybele - Alternate clay render closeup' }
            ],
            [
                { type: 'image', src: 'images/fulls/portrait-dali.jpg', description: 'Salvador Dalí - High-fidelity traditional charcoal portrait study' }
            ],
            [
                { type: 'image', src: 'images/fulls/creature.jpg', description: 'Demonic Creature Study - ZBrush organic detail clay sculpt' }
            ],
            [
                { type: 'image', src: 'images/fulls/sarbeswar-kalita-sword-01.jpg', description: 'Fantasy Sword Artifact - 3D Weapon modeling side view' },
                { type: 'image', src: 'images/fulls/sarbeswar-kalita-sword-02.jpg', description: 'Fantasy Sword Artifact - Hilt detail closeup' },
                { type: 'image', src: 'images/fulls/sarbeswar-kalita-sword-03.jpg', description: 'Fantasy Sword Artifact - Blade etchings render' },
                { type: 'image', src: 'images/fulls/sarbeswar-kalita-sword-04.jpg', description: 'Fantasy Sword Artifact - Alternate lighting study' },
                { type: 'image', src: 'images/fulls/sarbeswar-kalita-sword-05.jpg', description: 'Fantasy Sword Artifact - Wireframe model viewport' }
            ],
            [
                { type: 'image', src: 'images/fulls/Spirit of Ecstasy_main .jpg', description: 'Spirit of Ecstasy - Classical wing-figure sculpture front view' },
                { type: 'image', src: 'images/fulls/Spirit of Ecstasy_02.jpg', description: 'Spirit of Ecstasy - Classical wing-figure sculpture alternate view' },
                { type: 'youtube', src: 'https://www.youtube-nocookie.com/embed/gufMtu5I7A4', description: 'Spirit of Ecstasy - ZBrush dynamic clay modeling process' },
                { type: 'youtube', src: 'https://www.youtube-nocookie.com/embed/PYpSRa3fGOg', description: 'Spirit of Ecstasy - 360-degree digital clay turntable showcase' }
            ]
        ];

        let currentSetIndex = 0;
        let currentImageIndex = 0;

        function openModal(setIndex) {
            currentSetIndex = setIndex;
            currentImageIndex = 0;
            populateModal();
            document.getElementById("imageModal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("imageModal").style.display = "none";
        }

        function populateModal() {
            const modalContent = document.getElementById("modalContent");
            modalContent.innerHTML = ''; // Clear previous content

            const set = imageSets[currentSetIndex];
            const content = set[currentImageIndex];

            let element;
            if (content.type === 'image') {
                element = document.createElement('img');
                element.src = content.src;
            } else if (content.type === 'video') {
                element = document.createElement('video');
                element.src = content.src;
                element.controls = true; // Ensure controls are added
            } else if (content.type === 'youtube') {
                element = document.createElement('iframe');
                element.src = content.src;
                element.frameBorder = "0";
                element.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
                element.allowFullscreen = true;
            }

            if (element) {
                modalContent.appendChild(element);

                const description = document.createElement('p');
                description.className = 'description';
                description.textContent = content.description;
                modalContent.appendChild(description);

                // Adjust size of content to fit the screen
                const modalWidth = window.innerWidth * 0.9;
                const modalHeight = window.innerHeight * 0.9;
                element.style.maxWidth = modalWidth + 'px';
                element.style.maxHeight = modalHeight + 'px';

                // For iframes, maintain aspect ratio
                if (content.type === 'youtube') {
                    element.style.height = (modalWidth * 0.5625) + 'px'; // 16:9 aspect ratio
                    element.style.maxHeight = 'none'; // Override max-height for iframes
                }
            }
        }

        function prevImage() {
            if (currentImageIndex > 0) {
                currentImageIndex--;
                populateModal();
            } else {
                closeModal();
            }
        }

        function nextImage() {
            const set = imageSets[currentSetIndex];
            if (currentImageIndex < set.length - 1) {
                currentImageIndex++;
                populateModal();
            } else {
                closeModal();
            }
        }

        // Close the modal if user clicks outside of it
        window.onclick = function(event) {
            const modal = document.getElementById("imageModal");
            if (event.target === modal) {
                modal.style.display = "none";
            }
        }
    </script>
</body>
</html>
